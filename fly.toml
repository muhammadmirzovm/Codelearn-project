app = 'mondaycodelearn'
primary_region = 'sin'

[build]

[deploy]
  release_command = "sh -c 'python manage.py migrate --no-input && python manage.py fix_memberships && python manage.py fix_records'"
[env]
  PORT = "8000"
  DJANGO_SETTINGS_MODULE = "codelearn.settings.production"

[processes]
  app = "daphne -b 0.0.0.0 -p 8000 codelearn.asgi:application"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
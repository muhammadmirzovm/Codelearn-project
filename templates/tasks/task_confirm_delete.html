{% extends "base.html" %}
{% block title %}Delete Task – CodeLearn{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;">
  <div class="card card-p fade-up" style="text-align:center;">
    <div style="width:64px;height:64px;background:var(--danger-bg);border:1.5px solid var(--danger-brd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 20px;">🗑</div>
    <h1 style="font-family:var(--font-display);font-size:1.6rem;font-weight:700;margin-bottom:8px;">Delete Task?</h1>
    <p style="color:var(--text-muted);margin-bottom:8px;">You are about to permanently delete:</p>
    <p style="font-weight:600;font-size:1rem;color:var(--danger);margin-bottom:24px;">{{ task.title }}</p>
    <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:28px;">All test cases will be permanently deleted. This action cannot be undone.</p>
    <form method="post" style="display:flex;gap:12px;justify-content:center;">
      {% csrf_token %}
      <a href="{% url 'tasks:task_list' %}" class="btn btn-ghost">Cancel</a>
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
    </form>
  </div>
</div>
{% endblock %}
